<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="menuToggle.emit()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="app-brand">
    <mat-icon class="brand-icon">schedule</mat-icon>
    <span class="app-title">Timesheet</span>
  </div>

  <span class="spacer"></span>

  <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
    <div class="user-avatar">{{ initials }}</div>
    <span class="user-name">{{ firstName }}</span>
    <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" class="user-menu">
    @if (!isAdmin) {
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person</mat-icon> Profile
      </button>
    }
    <button mat-menu-item (click)="openChangePassword()">
      <mat-icon>lock</mat-icon> Change Password
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>exit_to_app</mat-icon> Logout
    </button>
  </mat-menu>
</mat-toolbar>
