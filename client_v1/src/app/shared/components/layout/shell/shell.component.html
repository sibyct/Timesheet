<mat-sidenav-container class="shell-container" (backdropClick)="onBackdropClick()">

  <mat-sidenav class="shell-sidenav"
               [mode]="sidenavMode()"
               [opened]="sidenavOpen()">
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <app-header />
    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
