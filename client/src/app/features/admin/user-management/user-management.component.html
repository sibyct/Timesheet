<div class="user-management-page">
  <div class="page-header">
    <h1 class="page-title">User Management</h1>
    <div class="header-actions">
      <button mat-raised-button color="primary" (click)="addUser()">
        <mat-icon>person_add</mat-icon> Add User
      </button>
      <button mat-raised-button (click)="manageProjects()">
        <mat-icon>folder_open</mat-icon> Manage Projects
      </button>
    </div>
  </div>

  <mat-card>
    <mat-card-content class="card-content-flush">

      @if (users.length === 0) {
        <div class="empty-state">
          <mat-icon>group</mat-icon>
          <p>No users found. Add a user to get started.</p>
        </div>
      } @else {
        <table mat-table [dataSource]="users" class="users-table">

          <ng-container matColumnDef="userId">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let u">
              <span class="id-cell">{{ u.userId }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef>Username</th>
            <td mat-cell *matCellDef="let u">
              <span class="username-cell">{{ u.username }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef>First Name</th>
            <td mat-cell *matCellDef="let u">{{ u.firstName }}</td>
          </ng-container>

          <ng-container matColumnDef="lastName">
            <th mat-header-cell *matHeaderCellDef>Last Name</th>
            <td mat-cell *matCellDef="let u">{{ u.lastName }}</td>
          </ng-container>

          <ng-container matColumnDef="emailAddress">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">
              <span class="email-cell">{{ u.emailAddress }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="contractType">
            <th mat-header-cell *matHeaderCellDef>Contract</th>
            <td mat-cell *matCellDef="let u">
              <span class="badge badge--info">{{ u.contractType }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let u" class="actions-cell">
              <button mat-icon-button color="primary" (click)="editUser(u)" matTooltip="Edit user">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="resetPassword(u)" matTooltip="Reset password">
                <mat-icon>lock_reset</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteUser(u)" matTooltip="Delete user">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      }

    </mat-card-content>
  </mat-card>
</div>
